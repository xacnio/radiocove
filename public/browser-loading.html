<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-app-region: drag;
            /* Let user drag window while loading */
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #1DB954;
            /* Radiocove green */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .text {
            color: #888888;
            font-size: 14px;
            font-weight: 500;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="spinner"></div>
    <div class="text">Loading Browser...</div>

    <script>
        // Check local storage for theme
        try {
            var raw = localStorage.getItem('rx_ui_state');
            var ui = raw ? JSON.parse(raw) : {};
            var theme = ui.theme || 'system';
            var isLight = theme === 'light' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches);
            if (isLight) {
                document.body.style.backgroundColor = '#f5f5f5';
                document.querySelector('.text').style.color = '#555555';
                document.querySelector('.spinner').style.borderColor = 'rgba(0,0,0,0.1)';
                document.querySelector('.spinner').style.borderTopColor = '#199C47';
            }
        } catch (e) { }
    </script>
</body>

</html>
