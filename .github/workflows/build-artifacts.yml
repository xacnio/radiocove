name: 'Build Artifacts'

on:
  workflow_dispatch:
    inputs:
      os_target:
        description: 'Which OS to build for?'
        required: true
        type: choice
        options:
          - all
          - windows
          - macos
          - ubuntu
        default: 'all'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Build frontend once ──────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── Step 2: Build native binaries ───────────────────────────────
  build-tauri:
    needs: [build-frontend]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            rust-targets: 'x86_64-pc-windows-msvc'
            cache-key: 'win-x64'
            group_name: 'windows'

          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
            cache-key: 'win-arm64'
            group_name: 'windows'

          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            cache-key: 'macos-universal'
            group_name: 'macos'

          - platform: 'ubuntu-22.04'
            args: '--target x86_64-unknown-linux-gnu'
            rust-targets: 'x86_64-unknown-linux-gnu'
            cache-key: 'linux-x64'
            group_name: 'ubuntu'

          - platform: 'ubuntu-22.04'
            args: '--target aarch64-unknown-linux-gnu --bundles deb,rpm'
            rust-targets: 'aarch64-unknown-linux-gnu'
            cache-key: 'linux-arm64'
            group_name: 'ubuntu'

    steps:
      - name: Skip Check
        if: ${{ github.event.inputs.os_target != 'all' && matrix.group_name != github.event.inputs.os_target }}
        run: echo "Skipping due to os_target choice."

      - uses: actions/checkout@v4
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
      - name: Install Linux dependencies (x64)
        if: ${{ matrix.cache-key == 'linux-x64' && (github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target) }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev
      - name: Install Linux cross-compile dependencies (arm64)
        if: ${{ matrix.cache-key == 'linux-arm64' && (github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target) }}
        run: |
          sudo dpkg --add-architecture arm64
          # Add arm64 sources from ports.ubuntu.com
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          # Restrict existing sources to amd64 only
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libssl-dev:arm64 gcc-aarch64-linux-gnu g++-aarch64-linux-gnu patchelf \
            libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64 libappindicator3-dev:arm64 \
            librsvg2-dev:arm64 libasound2-dev:arm64
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Download frontend
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Setup Node.js
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install Rust stable
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: Cache Cargo.lock
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        id: cargo-lock-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/Cargo.lock
          key: cargo-lock-${{ matrix.cache-key }}-${{ hashFiles('src-tauri/Cargo.toml') }}
      - name: Generate Cargo.lock
        if: ${{ steps.cargo-lock-cache.outputs.cache-hit != 'true' && (github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target) }}
        run: cargo generate-lockfile
        working-directory: src-tauri
      - name: Rust cache
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.cache-key }}
      
      - name: Cache node_modules
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install npm deps
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        run: npm ci

      - name: Skip frontend build
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        run: node -e "const f='src-tauri/tauri.conf.json';const j=JSON.parse(require('fs').readFileSync(f,'utf8'));j.build.beforeBuildCommand='';require('fs').writeFileSync(f,JSON.stringify(j,null,4))"

      - name: Build Tauri App
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: List build output
        if: ${{ (github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target) && runner.os != 'Windows' }}
        run: find src-tauri/target -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) 2>/dev/null || true

      - name: List build output (Windows)
        if: ${{ (github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target) && runner.os == 'Windows' }}
        run: Get-ChildItem -Path src-tauri/target -Recurse -File -Include *.msi, *.exe | Select-Object -ExpandProperty FullName
        shell: powershell

      - name: Upload Artifacts
        if: ${{ github.event.inputs.os_target == 'all' || matrix.group_name == github.event.inputs.os_target }}
        uses: actions/upload-artifact@v4
        with:
          name: radiocove-${{ matrix.cache-key }}
          path: |
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: warn
